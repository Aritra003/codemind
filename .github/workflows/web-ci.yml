name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "packages/web/**"
      - "pnpm-lock.yaml"

jobs:
  typecheck-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: "postgresql://postgres:placeholder@localhost:5432/stinkit"

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
